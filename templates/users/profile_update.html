{% extends 'base.html' %}
{% load bootstrap5 %}


{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card mt-5">
                <div class="card-body">
                    <h1 class="card-title text-center">Update Your Profile</h1>
                    <form method="post" enctype="multipart/form-data" class="mt-4">
                        {% csrf_token %}
                        {% bootstrap_form form %}
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                    <p class="text-center mt-3"><a href="{% url 'dashboard' %}">Back to Dashboard</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
