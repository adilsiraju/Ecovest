{% extends 'authentication_base.html' %}

{% block content %}
<style>
    .login-container {
        max-width: 400px;
        margin: 50px auto;
        padding: 2rem;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
    }

    .login-container h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        color: #2c3e50;
    }

    .login-container p {
        font-size: 1rem;
        color: #666;
        margin-bottom: 2rem;
    }

    .login-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .login-form p {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .login-form label {
        font-weight: bold;
        color: #333;
    }

    .login-form input {
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 1rem;
    }

    .login-form input:focus {
        outline: none;
        border-color: #27ae60;
        box-shadow: 0 0 0 2px rgba(39, 174, 96, 0.2);
    }

    .login-button {
        padding: 0.75rem;
        background-color: #27ae60;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 1rem;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }

    .login-button:hover {
        background-color: #2ecc71;
    }

    .signup-link {
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: #666;
    }

    .signup-link a {
        color: #27ae60;
        text-decoration: none;
    }

    .signup-link a:hover {
        text-decoration: underline;
    }
</style>

<div class="login-container">
    <h1>Welcome Back</h1>
    <p>Log in to continue your journey towards sustainable investing.</p>
    <form method="post" class="login-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="login-button">Log In</button>
    </form>
    <p class="signup-link">Don't have an account? <a href="{% url 'register' %}">Sign up</a></p>
</div>
{% endblock %}
