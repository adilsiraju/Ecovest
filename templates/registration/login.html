{% extends 'base.html' %}
{% load bootstrap5 %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card mt-5">
                <div class="card-body">
                    <h1 class="card-title text-center">Welcome Back</h1>
                    <p class="card-text text-center">Log in to continue your journey towards sustainable investing.</p>
                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        {% bootstrap_form form %}
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Log In</button>
                        </div>
                    </form>
                    <p class="text-center mt-3">Don't have an account? <a href="{% url 'register' %}">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
